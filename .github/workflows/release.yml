name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.0)'
        required: false
        default: 'dev'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ════════════════════════════════════════════
  #  macOS arm64 (Apple Silicon M1/M2/M3)
  # ════════════════════════════════════════════
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pyinstaller-hooks-contrib

      - name: Build binary
        run: |
          pyinstaller ctf_toolkit.spec --clean --noconfirm
          ls -lh dist/

      - name: Rename binary
        run: mv dist/ctf-toolkit dist/ctf-toolkit-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctf-toolkit-macos-arm64
          path: dist/ctf-toolkit-macos-arm64

  # ════════════════════════════════════════════
  #  Windows x64
  # ════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pyinstaller-hooks-contrib

      - name: Build binary
        run: |
          pyinstaller ctf_toolkit.spec --clean --noconfirm
          dir dist\

      - name: Rename binary
        run: mv dist\ctf-toolkit.exe dist\ctf-toolkit-windows-x64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctf-toolkit-windows-x64
          path: dist\ctf-toolkit-windows-x64.exe

  # ════════════════════════════════════════════
  #  Linux x64
  # ════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pyinstaller-hooks-contrib

      - name: Build binary
        run: |
          pyinstaller ctf_toolkit.spec --clean --noconfirm
          ls -lh dist/

      - name: Rename binary
        run: mv dist/ctf-toolkit dist/ctf-toolkit-linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctf-toolkit-linux-x64
          path: dist/ctf-toolkit-linux-x64

  # ════════════════════════════════════════════
  #  创建 GitHub Release
  # ════════════════════════════════════════════
  release:
    needs: [build-macos-arm64, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/

      - name: List assets
        run: find release-assets -type f | sort

      - name: Get version
        id: version
        run: |
          if [ "${GITHUB_REF_TYPE}" == "tag" ]; then
            echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version || 'dev' }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "CTF Web Toolkit ${{ steps.version.outputs.version }}"
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          body: |
            ## CTF Web Toolkit ${{ steps.version.outputs.version }}

            ### 下载对应平台的可执行文件（无需安装 Python）

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | macOS Apple Silicon (M1/M2/M3) | `ctf-toolkit-macos-arm64` | arm64 |
            | Windows 10/11 | `ctf-toolkit-windows-x64.exe` | x64 |
            | Linux | `ctf-toolkit-linux-x64` | x86_64 |

            ### 使用方法

            **macOS / Linux：**
            ```bash
            chmod +x ctf-toolkit-macos-arm64
            ./ctf-toolkit-macos-arm64 --help
            ./ctf-toolkit-macos-arm64 scan http://target.com
            ./ctf-toolkit-macos-arm64 sqli http://target.com --param id
            ```

            **Windows：**
            ```cmd
            ctf-toolkit-windows-x64.exe --help
            ctf-toolkit-windows-x64.exe scan http://target.com
            ctf-toolkit-windows-x64.exe sqli http://target.com --param id
            ```

            ### 支持的攻击模块
            `sqli` `xss` `ssrf` `ssti` `lfi` `cmdi` `jwt` `xxe` `nosqli` `redirect`
            `upload` `webshell` `immortal` `shell` `cors` `audit` `encode`

          files: |
            release-assets/ctf-toolkit-macos-arm64/ctf-toolkit-macos-arm64
            release-assets/ctf-toolkit-windows-x64/ctf-toolkit-windows-x64.exe
            release-assets/ctf-toolkit-linux-x64/ctf-toolkit-linux-x64
